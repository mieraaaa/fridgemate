<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FridgeMate - Recipe List</title>
    <meta name="description" content="Browse recipes matched to your available ingredients."/>
    <link rel="stylesheet" href="style.css"/>
    <script src="webui.js"></script>
</head>
<body>

    <!-- ── Page Header ──────────────────────────────────── -->
    <header class="page-header">
        <button class="btn-icon" onclick="window.location.href='home.html'" aria-label="Go back">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="page-header__title-group">
            <h1 class="page-header__title">Recipes</h1>
            <p id="search-tags" class="page-header__subtitle">Matching: …</p>
        </div>
    </header>

    <!-- ── Main Content ─────────────────────────────────── -->
    <main class="page-main recipes-page">

        <!-- Count Row -->
        <section style="margin-bottom: 2rem;">
            <div class="recipes-meta">
                <h2 id="recipes-count" class="recipes-count-heading">0 Recipes Found</h2>
                <span class="recipes-sort">Sort: Popular</span>
            </div>
        </section>

        <!-- Recipe Cards -->
        <section id="recipes-container" style="display:flex; flex-direction:column; gap:1rem;"></section>

    </main>

    <!-- ── Bottom Nav ───────────────────────────────────── -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <span class="material-symbols-outlined">home</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="recipes.html" class="nav-item active">
            <span class="material-symbols-outlined">rebase_edit</span>
            <span class="nav-label">Recipes</span>
        </a>
        <a href="#" class="nav-item">
            <span class="material-symbols-outlined">bookmark</span>
            <span class="nav-label">Saved</span>
        </a>
    </nav>

    <!-- ── Scripts ──────────────────────────────────────── -->
    <script>
        const container = document.getElementById('recipes-container');
        const tagsEl    = document.getElementById('search-tags');
        const countEl   = document.getElementById('recipes-count');

        async function navigateToRecipe(id) {
            await webui.call("view_recipe_details", id.toString());
            window.location.href = "open card.html";
        }

        async function loadRecipes() {
            try {
                let res;
                for (let i = 0; i < 30; i++) {
                    try {
                        res = await webui.call("get_search_results");
                        break;
                    } catch (e) {
                        if (e.message && e.message.includes("WebSocket is not connected")) {
                            await new Promise(r => setTimeout(r, 100));
                        } else {
                            throw e;
                        }
                    }
                }

                if (!res) {
                    countEl.textContent = "Error: Backend returned empty response or timed out.";
                    return;
                }

                const data = JSON.parse(res);
                const { ingredients, results } = data;

                tagsEl.textContent = `Matching: ${ingredients.join(', ')}`;
                countEl.textContent = `${results.length} Recipes Found`;

                container.innerHTML = '';
                if (results.length === 0) {
                    container.innerHTML = '<p style="color:#78716c;font-style:italic;">No recipes found. Try different ingredients.</p>';
                    return;
                }

                results.forEach(recipe => {
                    const numIngredients  = recipe.ingredients ? recipe.ingredients.length : 0;
                    const matchPercentage = recipe.match_percentage || 0;

                    const article = document.createElement('article');
                    article.className = 'recipe-card';
                    article.onclick = () => navigateToRecipe(recipe.id);
                    article.innerHTML = `
                        <div class="recipe-card__thumb">
                            <img src="${recipe.image}" alt="${recipe.title}"/>
                            <div class="recipe-card__overlay"></div>
                        </div>
                        <div class="recipe-card__body">
                            <h3 class="recipe-card__title">${recipe.title}</h3>
                            <p class="recipe-card__meta">${recipe.time_minutes} mins | ${recipe.difficulty}</p>
                            <div class="recipe-card__stats">
                                <span>${numIngredients} INGREDIENTS</span>
                                <span class="recipe-card__match">${Math.round(matchPercentage)}% MATCH</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(article);
                });

            } catch (err) {
                countEl.textContent = "JS Exception: " + err.message;
            }
        }

        window.addEventListener('load', loadRecipes);
    </script>

</body>
</html>
